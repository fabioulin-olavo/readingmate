name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Decode keystore and create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/readingmate.jks
          KEYSTORE_PATH="$(pwd)/android/app/readingmate.jks"
          echo "storePassword=${STORE_PASSWORD}" > android/key.properties
          echo "keyPassword=${KEY_PASSWORD}" >> android/key.properties
          echo "keyAlias=${KEY_ALIAS}" >> android/key.properties
          echo "storeFile=${KEYSTORE_PATH}" >> android/key.properties
          echo "key.properties OK ($(wc -l < android/key.properties) lines)"
          echo "Keystore exists: $(test -f $KEYSTORE_PATH && echo yes || echo NO)"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release --shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: readingmate-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
